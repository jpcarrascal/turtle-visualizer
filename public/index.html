<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>turtle-visualizer</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <canvas id="visual-canvas" aria-label="Hydra canvas"></canvas>
      <section class="latency-overlay" aria-live="polite">
        <div class="latency-overlay__title">Latency Test</div>
        <div class="latency-overlay__row"><span>Last Note</span><strong id="latency-last-note">-</strong></div>
        <div class="latency-overlay__row"><span>MIDI Callback Lag</span><strong id="latency-callback-delay">-</strong></div>
        <div class="latency-overlay__row"><span>Paint Lag</span><strong id="latency-paint-delay">-</strong></div>
        <div class="latency-overlay__row"><span>Total (MIDI to Paint)</span><strong id="latency-last-delay">-</strong></div>
        <div class="latency-overlay__row"><span>Average Total</span><strong id="latency-avg-delay">-</strong></div>
        <div class="latency-overlay__hint">Enable with ?latency=1</div>
      </section>
      <div id="latency-flash" class="latency-flash" aria-hidden="true"></div>
      <section class="hud" aria-live="polite">
        <div class="hud__title">turtle-visualizer</div>
        <div class="hud__row"><span>Status</span><strong id="status-text">Starting</strong></div>
        <div class="hud__row"><span>Source</span><strong id="source-text">None</strong></div>
        <div class="hud__row"><span>Program</span><strong id="program-text">-</strong></div>
      </section>
    </main>
    <script src="/vendor/hydra-synth.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
